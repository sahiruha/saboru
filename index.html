<header class="w-full max-w-[420px] px-4 mt-6 mb-4 text-center">
  <a href="mockup.html" class="text-[11px] font-bold text-[#A8741A] underline opacity-70 hover:opacity-100">← UIモックアップ集を見る</a>
</header>

<!-- single phone frame -->
<div class="phone" id="phone">
  <div class="notch"></div>
  <div class="statusbar"><span>9:41</span><span>●●●&nbsp;&nbsp;◗</span></div>
  <main class="screen scroll-hide" id="screen" data-testid="screen"></main>
  <nav class="nav" id="nav">
    <button data-route="#/home" data-testid="nav-home"><svg class="w-5 h-5"><use href="#i-home"/></svg>ホーム</button>
    <button data-route="#/tasks" data-testid="nav-tasks"><svg class="w-5 h-5"><use href="#i-list"/></svg>タスク</button>
    <button data-route="#/ranking" data-testid="nav-ranking"><svg class="w-5 h-5"><use href="#i-crown"/></svg>ランキング</button>
    <button data-route="#/me" data-testid="nav-me"><svg class="w-5 h-5"><use href="#i-user"/></svg>マイページ</button>
    <button class="fab" data-route="#/task/add" data-testid="nav-fab" aria-label="タスクを追加">
      <svg class="w-5 h-5 text-white"><use href="#i-plus"/></svg>
    </button>
  </nav>
</div>

<!-- toast -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<footer class="text-center mt-6 mb-8 text-[#7A5E32] text-[11px] font-bold opacity-70">
  サボロー — ギリギリまで寝かせて、最後に間に合わせる人こそ偉い。
</footer>

<script src="app.js"></script>
</body>
</html>
